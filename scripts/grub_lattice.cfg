# =============================================================================
# grub_keuos.cfg — GRUB2 Menu Entry for KeuOS Exokernel
# =============================================================================
#
# This is a REFERENCE FILE. deploy_baremetal.sh installs the correct stanza
# automatically (detecting disk/partition). You only need this if doing it by
# hand.
#
# Manual install on UM890:
#   sudo cp /path/to/kernel.elf /boot/keuos/kernel.elf
#   sudo tee -a /etc/grub.d/40_custom < grub_keuos.cfg
#   sudo update-grub
#
# To find your GRUB root:
#   sudo grub-probe --target=drive /boot
#   # e.g. (hd0,gpt2) or (hd0,msdos1)
#
# =============================================================================

# ---- KeuOS Exokernel (bare metal) ----
menuentry 'KeuOS Exokernel (Multiboot1)' --class os {
    insmod part_gpt
    insmod ext2
    # Replace (hd0,gpt2) with output of: sudo grub-probe --target=drive /boot
    set root='(hd0,gpt2)'
    echo 'Loading KeuOS Exokernel...'
    # If /boot is a separate partition, path is /keuos/kernel.elf
    # If /boot is NOT separate (part of /), path is /boot/keuos/kernel.elf
    multiboot /boot/keuos/kernel.elf
    boot
}

# =============================================================================
# Serial console tip:
#   The KeuOS kernel writes boot diagnostics to COM1 (0x3F8, 115200 8N1).
#   To capture from another machine:
#     screen /dev/ttyUSB0 115200     (if using USB-serial adapter)
#     minicom -b 115200 -D /dev/ttyS0   (on the UM890 itself via SSH)
#
# Expected serial output on successful boot:
#   Y  – 32-bit entry reached
#   1  – Stack configured
#   2  – BSS zeroed
#   Z  – Paging configured
#   7  – Paging enabled
#   8  – GDT loaded
#   9  – Far jump ready
#   !X – 64-bit long mode active
#   Then kernel serial output from kmain
# =============================================================================
